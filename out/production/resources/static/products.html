<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동네 맛집 마감 특가</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 공통 스타일 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard Variable", Pretendard, sans-serif; }
        body { background-color: #F8F9FA; color: #333333; }

        /* 데스크톱 맞춤형 넓은 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 50px 24px;
        }

        .header-section { margin-bottom: 40px; text-align: center; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; color: #222222; }
        /* 배민 특유의 민트색 포인트 */
        h1 span { color: #2AC1BC; }
        .subtitle { font-size: 18px; color: #666666; line-height: 1.5; }

        /* 데스크톱용 그리드(Grid) 레이아웃: 화면 크기에 맞춰 3~4개씩 배치됨 */
        .store-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }

        .store-card {
            background-color: #FFFFFF;
            border: 1px solid #E9ECEF;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .store-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        /* 가게 썸네일 이미지 (배민 느낌으로 꽉 차게) */
        .store-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #F1F3F5;
        }

        .store-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }

        .store-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .rating { color: #FFD600; }
        .review-count { color: #868E96; font-weight: 500; }

        .store-title { font-size: 20px; font-weight: 700; color: #222222; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .menu-name { font-size: 14px; color: #495057; margin-bottom: 16px; }

        /* 가격 정보 레이아웃 */
        .price-wrap { display: flex; align-items: baseline; gap: 10px; margin-bottom: 24px; margin-top: auto; }
        .discount-rate { color: #F04452; font-size: 22px; font-weight: 800; }
        .price-info { display: flex; flex-direction: column; }
        .price-original { color: #ADB5BD; font-size: 13px; text-decoration: line-through; margin-bottom: 2px; }
        .price-final { color: #222222; font-size: 20px; font-weight: 700; }

        .btn-primary {
            width: 100%;
            background-color: #2AC1BC; /* 배민 민트색 */
            color: white;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: #23A8A3; }

        .loading-text { text-align: center; color: #868E96; padding: 60px 0; font-size: 16px; grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1>오늘의 <span>마감 특가</span></h1>
        <p class="subtitle">영업 종료 전, 한정 수량으로 제공되는 파격 할인을 놓치지 마세요!</p>
    </div>

    <div id="storeList" class="store-list">
        <div class="loading-text">우리 동네 맛집 정보를 불러오는 중입니다...</div>
    </div>
</div>

<script>
    // 백엔드 API 엔드포인트를 /api/products 로 맞춥니다.
    const API_URL = '/api/products';

    function formatPrice(price) {
        return price.toLocaleString('ko-KR') + '원';
    }

    // 선착순 주문(대기열) 화면으로 이동
    function goToQueue(productId) {
        window.location.href = `/index.html?productId=${productId}`;
    }

    function createProductCard(product) {
        return `
      <div class="store-card">
        <img src="${product.imageUrl}" alt="${product.storeName}" class="store-image" loading="lazy">
        <div class="store-info">
          <div class="store-meta">
            <span class="rating">★ ${product.rating}</span>
            <span class="review-count">(${product.reviewCount})</span>
          </div>
          <div class="store-title">${product.storeName}</div>
          <div class="menu-name">대표메뉴: ${product.menuName}</div>

          <div class="price-wrap">
            <span class="discount-rate">${product.discountRate}%</span>
            <div class="price-info">
              <div class="price-original">${formatPrice(product.originalPrice)}</div>
              <div class="price-final">${formatPrice(product.discountPrice)}</div>
            </div>
          </div>

          <button class="btn-primary" onclick="goToQueue(${product.id})">특가 주문하기</button>
        </div>
      </div>
    `;
    }

    async function loadProducts() {
        const storeListEl = document.getElementById('storeList');
        try {
            // Caffeine Local Cache에서 0ms 수준으로 즉각 응답을 받는 API
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('API 호출 실패');

            const products = await response.json();

            // 데이터가 비어있을 경우 방어 로직
            if (products.length === 0) {
                storeListEl.innerHTML = '<div class="loading-text">현재 진행 중인 마감 특가가 없습니다.</div>';
                return;
            }

            storeListEl.innerHTML = products.map(createProductCard).join('');
        } catch (error) {
            storeListEl.innerHTML = '<div class="loading-text">서버와 통신할 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
            console.error(error);
        }
    }

    loadProducts();
</script>
</body>
</html>
