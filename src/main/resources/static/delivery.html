<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>물류 서비스</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#F2F4F6] text-[#191F28] flex justify-center p-4">

<div class="w-full max-w-md bg-white rounded-[24px] shadow-sm overflow-hidden flex flex-col h-[850px]">

  <header class="px-6 pt-8 pb-4">
    <h1 class="text-2xl font-bold mb-6">물류 서비스</h1>
    <div class="flex bg-[#F2F4F6] rounded-xl p-1">
      <button id="tab-customer" onclick="switchTab('CUSTOMER')" class="flex-1 py-3 text-sm font-semibold rounded-lg transition-colors bg-white shadow-sm text-[#3182F6]">고객 조회용</button>
      <button id="tab-driver" onclick="switchTab('DRIVER')" class="flex-1 py-3 text-sm font-semibold rounded-lg transition-colors text-[#8B95A1]">기사 업무용</button>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto px-6 pb-8 bg-[#F2F4F6]">
    <div id="view-customer" class="space-y-4 mt-2 block">
      <div class="relative">
        <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-[#8B95A1] w-5 h-5"></i>
        <input type="text" id="searchInput" value="5928-1234-5678" oninput="renderCustomerView()" placeholder="운송장 번호 입력"
               class="w-full bg-white rounded-2xl py-4 pl-12 pr-4 text-[15px] font-medium placeholder-[#8B95A1] focus:outline-none focus:ring-2 focus:ring-[#3182F6]">
      </div>
      <div id="customer-result"></div>
    </div>

    <div id="view-driver" class="space-y-4 mt-2 hidden">
      <h2 class="text-lg font-bold px-1 mb-4">할당된 배송 목록</h2>
      <div id="driver-list"></div>
    </div>
  </main>
</div>

<script>
  // --- [모의 데이터 (MongoDB에서 조회한 Flattening 문서 구조 가정)] ---
  let deliveries = [
    {
      id: 1, trackingNumber: '5928-1234-5678', receiver: '김토스', phoneNumber: '010-1234-5678', address: '서울시 강남구 테헤란로 142', memo: '문 앞에 두고 벨 눌러주세요.', status: 'PENDING',
      // 조인된 데이터들 (Order, Rider)
      orderSummary: '반반족발(대) 외 1건', totalPrice: 45000,
      riderName: '배차 전', riderPhoneNumber: ''
    },
    {
      id: 2, trackingNumber: '5928-9876-5432', receiver: '이송금', phoneNumber: '010-8765-4321', address: '부산시 해운대구 마린시티', memo: '경비실에 맡겨주세요.', status: 'PICKUP',
      // 조인된 데이터들 (Order, Rider)
      orderSummary: '페퍼로니 피자 세트', totalPrice: 28000,
      riderName: '김배달', riderPhoneNumber: '010-9999-8888'
    }
  ];

  const STATUS_MAP = {
    PENDING: { label: '접수 완료', icon: 'clock', color: 'text-gray-400', next: 'PICKUP', nextLabel: '집화 처리' },
    PICKUP: { label: '집화 완료', icon: 'package', color: 'text-blue-500', next: 'SHIPPED', nextLabel: '배송 출발' },
    SHIPPED: { label: '배송 출발', icon: 'truck', color: 'text-blue-500', next: 'DELIVERED', nextLabel: '배송 완료' },
    DELIVERED: { label: '배송 완료', icon: 'check-circle', color: 'text-green-500', next: null, nextLabel: null }
  };
  const STATUS_STEPS = ['PENDING', 'PICKUP', 'SHIPPED', 'DELIVERED'];

  function switchTab(mode) {
    document.getElementById('view-customer').classList.toggle('hidden', mode !== 'CUSTOMER');
    document.getElementById('view-driver').classList.toggle('hidden', mode !== 'DRIVER');

    document.getElementById('tab-customer').className = `flex-1 py-3 text-sm font-semibold rounded-lg transition-colors ${mode === 'CUSTOMER' ? 'bg-white shadow-sm text-[#3182F6]' : 'text-[#8B95A1]'}`;
    document.getElementById('tab-driver').className = `flex-1 py-3 text-sm font-semibold rounded-lg transition-colors ${mode === 'DRIVER' ? 'bg-white shadow-sm text-[#3182F6]' : 'text-[#8B95A1]'}`;

    mode === 'CUSTOMER' ? renderCustomerView() : renderDriverView();
  }

  // --- [백엔드 API 호출 모의] ---
  function changeStatus(id, newStatus) {
    deliveries = deliveries.map(d => d.id === id ? { ...d, status: newStatus } : d);
    renderDriverView();
    renderCustomerView();
  }

  // [핵심] 주소 변경 시도 (상태 락 방어 구현)
  function attemptEditAddress(id) {
    const delivery = deliveries.find(d => d.id === id);

    if (delivery.status !== 'PENDING') {
      alert("🚨 이미 기사님이 집화를 시작하여 배송지를 변경할 수 없습니다.\n고객센터로 문의해주세요.");
      return;
    }

    const newAddress = prompt("새로운 배송지를 입력하세요:", delivery.address);
    if (newAddress && newAddress !== delivery.address) {
      deliveries = deliveries.map(d => d.id === id ? { ...d, address: newAddress } : d);
      alert("✅ 배송지가 성공적으로 변경되었습니다!");
      renderCustomerView();
    }
  }

  function renderCustomerView() {
    const query = document.getElementById('searchInput').value;
    const found = deliveries.find(d => d.trackingNumber === query);
    const container = document.getElementById('customer-result');

    if (!found) {
      container.innerHTML = `<div class="text-center py-12 text-[#8B95A1]">운송장 번호를 확인해주세요.</div>`;
      return;
    }

    let stepsHtml = '';
    STATUS_STEPS.forEach((step, index) => {
      const isCompleted = STATUS_STEPS.indexOf(found.status) >= index;
      stepsHtml += `
        <div class="relative z-10 flex items-center gap-4">
            <div class="w-3 h-3 rounded-full flex-shrink-0 ${isCompleted ? 'bg-[#3182F6] ring-4 ring-[#E8F3FF]' : 'bg-[#D1D6DB]'}"></div>
            <div class="flex items-center gap-2 ${isCompleted ? 'text-[#191F28]' : 'text-[#8B95A1]'}">
                <i data-lucide="${STATUS_MAP[step].icon}" class="w-5 h-5"></i>
                <span class="font-semibold text-[15px]">${STATUS_MAP[step].label}</span>
            </div>
        </div>`;
    });

    container.innerHTML = `
      <div class="bg-white rounded-[20px] p-6 shadow-sm mt-6">
          <div class="flex justify-between items-start mb-8">
              <div>
                  <p class="text-[#8B95A1] text-sm mb-1">${found.trackingNumber}</p>
                  <h2 class="text-lg font-bold">${found.receiver}님의 택배</h2>
              </div>
              <span class="px-3 py-1 rounded-full text-xs font-bold bg-[#E8F3FF] text-[#3182F6]">
                  ${STATUS_MAP[found.status].label}
              </span>
          </div>
          <div class="relative pl-4 space-y-8 mb-8">
              <div class="absolute left-5 top-2 bottom-2 w-0.5 bg-[#F2F4F6] z-0"></div>
              ${stepsHtml}
          </div>

          <div class="bg-[#F9FAFB] rounded-xl p-4 text-[14px]">
            <div class="flex justify-between items-center border-b border-[#E5E8EB] pb-3 mb-3">
                <span class="font-bold text-[#4E5968]">주문 내역</span>
                <span class="font-semibold">${found.orderSummary} <span class="text-[#3182F6] ml-1">${found.totalPrice.toLocaleString()}원</span></span>
            </div>

            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-[#4E5968]">배송 상세 정보</span>
              <button onclick="attemptEditAddress(${found.id})" class="text-[#3182F6] font-semibold text-[13px] hover:underline">
                정보 수정
              </button>
            </div>
            <div class="flex flex-col gap-1.5 text-[#4E5968] mt-3">
              <div class="flex"><span class="w-16 text-[#8B95A1]">연락처</span><span>${found.phoneNumber}</span></div>
              <div class="flex"><span class="w-16 text-[#8B95A1]">배송지</span><span>${found.address}</span></div>
              <div class="flex"><span class="w-16 text-[#8B95A1]">요청사항</span><span class="text-red-500 font-medium">${found.memo}</span></div>
            </div>

            <div class="flex justify-between items-center mt-3 pt-3 border-t border-[#E5E8EB] border-dashed">
                <span class="w-16 text-[#8B95A1]">담당 기사</span>
                <span class="font-semibold text-[#191F28]">
                    ${found.riderName}
                    ${found.riderPhoneNumber ? `<a href="tel:${found.riderPhoneNumber}" class="text-[#3182F6] ml-2 border border-[#3182F6] px-2 py-0.5 rounded-full text-[12px] bg-white">전화하기</a>` : ''}
                </span>
            </div>
          </div>
      </div>
    `;
    lucide.createIcons();
  }

  function renderDriverView() {
    const container = document.getElementById('driver-list');
    let html = '';
    deliveries.forEach(delivery => {
      const info = STATUS_MAP[delivery.status];
      const btn = info.next
              ? `<button onclick="changeStatus(${delivery.id}, '${info.next}')" class="w-full bg-[#3182F6] text-white font-bold text-[15px] py-3.5 rounded-[12px] active:bg-[#1B64DA] transition-colors mt-2">${info.nextLabel}</button>`
              : `<div class="w-full bg-[#F2F4F6] text-[#8B95A1] font-bold text-[15px] py-3.5 rounded-[12px] text-center mt-2">처리가 완료되었습니다</div>`;

      html += `
        <div class="bg-white rounded-[20px] p-5 shadow-sm mb-4">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[#8B95A1] text-xs font-medium">${delivery.trackingNumber}</span>
                <span class="text-xs font-bold ${info.color}">${info.label}</span>
            </div>
            <h3 class="text-[17px] font-bold mb-1">${delivery.receiver} <span class="text-[14px] text-[#8B95A1] font-normal ml-1">(${delivery.orderSummary})</span></h3>

            <div class="flex flex-col gap-2 mb-4">
              <div class="flex items-start gap-1 text-[#4E5968]">
                  <i data-lucide="map-pin" class="w-4 h-4 mt-0.5 flex-shrink-0 text-[#8B95A1]"></i>
                  <p class="text-[14px] leading-tight">${delivery.address}</p>
              </div>
              <div class="flex items-start gap-1 text-[#4E5968]">
                  <i data-lucide="message-square" class="w-4 h-4 mt-0.5 flex-shrink-0 text-[#8B95A1]"></i>
                  <p class="text-[14px] leading-tight text-red-500 font-medium">${delivery.memo}</p>
              </div>
            </div>
            ${btn}
        </div>`;
    });
    container.innerHTML = html;
    lucide.createIcons();
  }

  lucide.createIcons();
  renderCustomerView();
</script>
</body>
</html>
